<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Sıfırlama | Medipro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 320px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #0b5ed8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .error {
            color: red;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .success {
            color: green;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2 style="text-align: center; color: #0b5ed8;">Yeni Şifre Belirle</h2>
        <form id="reset-form">
            <input type="password" id="new-password" placeholder="Yeni Şifre" required>
            <input type="password" id="confirm-password" placeholder="Şifre Tekrar" required>
            <button type="submit">Şifreyi Güncelle</button>
            <p id="msg" class="error"></p>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        document.getElementById('reset-form').onsubmit = async (e) => {
            e.preventDefault();
            const p1 = document.getElementById('new-password').value;
            const p2 = document.getElementById('confirm-password').value;
            const msg = document.getElementById('msg');

            if (p1 !== p2) {
                msg.textContent = 'Şifreler eşleşmiyor.';
                return;
            }

            if (p1.length < 6) {
                msg.textContent = 'Şifre en az 6 karakter olmalı.';
                return;
            }

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: p1 })
                });
                const data = await res.json();

                if (data.success) {
                    msg.className = 'success';
                    msg.textContent = 'Şifre güncellendi! Yönlendiriliyorsunuz...';
                    setTimeout(() => window.location.href = '/admin/', 2000);
                } else {
                    msg.className = 'error';
                    msg.textContent = data.message;
                }
            } catch (err) {
                msg.textContent = 'Bir hata oluştu.';
            }
        };
    </script>
</body>

</html>
